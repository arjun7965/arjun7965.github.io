version: 2
updates:
  # Dev dependencies (linters, Playwright, Lighthouse CI)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      # Bundle routine bumps into a single weekly PR; majors arrive
      # individually so breaking changes get their own review
      npm-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      actions:
        patterns: ["*"]
